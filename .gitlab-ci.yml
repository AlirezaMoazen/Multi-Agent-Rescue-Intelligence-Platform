image: python:3.12

default:
  tags:
    - container
    - podman
    - "builder 1"
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

stages:
  - lint
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

before_script:
  - python --version
  - python -m pip install --upgrade pip
  - python -m pip install -e ".[dev]"

lint:
  stage: lint
  script:
    - ruff check src tests scripts

test:
  stage: test
  # Install CPU-only torch so the MAPPO tests run (they skip if torch is absent).
  script:
    - python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
    - pytest

# --- Simple MR Approval Workaround --- (DOES NOT WORK!!!)
# This job runs only on Merge Requests and requires a manual "Play" click to finish.
# Since the pipeline won't succeed until this is clicked, the MR cannot be merged.
peer-approval:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: false
  script:
    - echo "Merge Request manually approved by a peer!"

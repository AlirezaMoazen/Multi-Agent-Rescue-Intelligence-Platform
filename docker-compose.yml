services:
  # Base service definition
  base: &base
    build: .
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/src:/app
      - FRONTEND_DIST_DIR=/app/frontend_dist
    volumes:
      - ./checkpoints:/app/checkpoints

  # ── Visualization dashboard (backend + frontend) ────────────────────
  viz:
    <<: *base
    ports:
      - "8000:8000"
    command: uvicorn src.rescue_sim.visualization.api:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      # Mount source so --reload picks up changes
      - ./src:/app/src
      - ./configs:/app/configs
      - ./checkpoints:/app/checkpoints
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s

  # ── Interactive development shell ───────────────────────────────────
  dev:
    <<: *base
    command: /bin/bash
    stdin_open: true
    tty: true

  # ── Run tests ──────────────────────────────────────────────────────
  test:
    <<: *base
    command: pytest

  # ── Run linting ────────────────────────────────────────────────────
  lint:
    <<: *base
    command: ruff check src tests scripts

  # ── Run the simulation script ──────────────────────────────────────
  run:
    <<: *base
    command: python scripts/run_scenario.py

  # ── Train MAPPO (deep multi-agent RL) ───────────────────────────────
  train-mappo:
    <<: *base
    command: python scripts/train_mappo.py --grid 20 --agents 4 --view-radius 3 --max-steps 500 --updates 100 --checkpoint checkpoints/mappo.pt

  # ── Train QMIX (deep multi-agent RL) ────────────────────────────────
  train-qmix:
    <<: *base
    command: python scripts/train_qmix.py --grid 20 --agents 4 --view-radius 3 --max-steps 500 --episodes 200 --checkpoint checkpoints/qmix.pt

  # ── Train TransfQMix (transformer-based deep MARL) ───────────────────
  train-transfqmix:
    <<: *base
    command: python scripts/train_transfqmix.py --grid 20 --agents 4 --view-radius 3 --max-steps 500 --episodes 200 --checkpoint checkpoints/transfqmix.pt

  # ── Compare all methods + ensemble + distilled student ──────────────
  compare-all:
    <<: *base
    command: python scripts/compare_all.py

  # ── Mixture-of-Experts: deep ensemble vs. adaptive tabular fleet ─────
  train-moe:
    <<: *base
    command: python scripts/train_moe.py

project:
  name: rescue-sim
  title: Multi-Agent Rescue Teams simulator
  implementation_languages:
    application_code: Python
    configuration: YAML
  objective: >
    Build a multi-agent Python simulator for a damaged rescue area supporting cooperative
    learning algorithms (QMIX, MAPPO) and a Neural Mixture of Experts (MoE) policy that
    handles communication blackouts.

scope:
  current:
    - Generate 20x20 discrete grid-based rescue scenarios.
    - Track communication blackouts using a permutation-invariant peer adjacency matrix.
    - Support cooperative reinforcement learning (QMIX, TransfQMix, MAPPO).
    - Deploy a Neural MoE policy using a Dual-Encoder topology.
    - Enforce fallback expert coordination under communication blackouts.
    - Provide a complete command-line live training dashboard (demo_moe.py).
    - Support multi-stage Docker builds optimized for CUDA runtime memory.

architecture_mapping:
  MoE:
    path: src/rescue_sim/MoE
    responsibility:
      - Neural MoE network implementation.
      - Logit blending of exploration, coordination, and fallback heads.
      - Dual encoder weight segregation.
      - Cross-entropy behavioural cloning and policy gradient gating training.
  MAPPO:
    path: src/rescue_sim/MAPPO
    responsibility:
      - Multi-Agent PPO training and policy gradient execution.
  QMIX:
    path: src/rescue_sim/QMIX
    responsibility:
      - Monotonic Q-value mixing and target Q-learning.
  environment:
    path: src/rescue_sim/environment
    responsibility:
      - Manage grid cell, obstacle, and target maps.
      - Return 7x7 ego-centric spatial observations (visibility radius r=3).
      - Build peer adjacency tracking matrices.

functional_requirements:
  - id: FR-001
    name: Ego-centric 7x7 observations
    description: The sensor model shall crop local spatial grid information to a 7x7 window representing the 3-block visibility range.
  - id: FR-002
    name: Permutation-invariant peer count
    description: The simulation shall pool neighbor link states into a peer count feature by summing along connection rows.
  - id: FR-003
    name: Logit-blending gating
    description: The policy shall combine unnormalized policy logits using weights from the Gating Router.
  - id: FR-004
    name: Invalid action masking
    description: The forward pass shall apply a boolean action mask to logits to prevent illegal moves.
  - id: FR-005
    name: Conditional blackout routing penalty
    description: The training loop shall penalize Gating Router weights during isolation if the fallback head is not allocated.

non_functional_requirements:
  - id: NFR-001
    name: VRAM Optimization
    description: PyTorch CUDA allocator parameters shall utilize async memory configurations to prevent fragmentation.
  - id: NFR-002
    name: Model Segregation
    description: The Dual-Encoder framework shall isolate learning between frozen expert brains and trainable gating networks.

testing_requirements:
  unit_tests:
    - SharedFeatureEncoder accepts 7x7 spatial input shapes.
    - Logit blending combines expert networks correctly.
    - Action masking assigns large negative values to illegal actions.
